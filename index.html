<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Cyber Scientific Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator-container">
    <div class="calculator">
      <div class="tabs-container">
        <button class="tab-btn active" onclick="switchMode('standard')">STANDARD</button>
        <button class="tab-btn" onclick="switchMode('scientific')">SCIENTIFIC</button>
      </div>
      
      <div class="display-wrapper">
        <div class="display-small" id="history"></div>
        <div class="display" id="display">0</div>
      </div>

      <div class="scientific-buttons" id="scientificButtons">
        <button class="btn btn-sci" onclick="appendFunction('sin')">sin</button>
        <button class="btn btn-sci" onclick="appendFunction('cos')">cos</button>
        <button class="btn btn-sci" onclick="appendFunction('tan')">tan</button>
        <button class="btn btn-sci" onclick="appendFunction('sqrt')">√</button>
        
        <button class="btn btn-sci" onclick="appendFunction('log')">log</button>
        <button class="btn btn-sci" onclick="appendFunction('ln')">ln</button>
        <button class="btn btn-sci" onclick="toggleRadDeg()">RAD</button>
        <button class="btn btn-sci" onclick="appendNumber(Math.PI.toString().slice(0, 5))">π</button>
        
        <button class="btn btn-sci" onclick="appendOperator('**')">x^y</button>
        <button class="btn btn-sci" onclick="appendNumber(Math.E.toString().slice(0, 5))">e</button>
        <button class="btn btn-sci" onclick="appendFunction('factorial')">x!</button>
        <button class="btn btn-sci" onclick="appendFunction('reciprocal')">1/x</button>
        
        <button class="btn btn-sci" onclick="appendFunction('asin')">asin</button>
        <button class="btn btn-sci" onclick="appendFunction('acos')">acos</button>
        <button class="btn btn-sci" onclick="appendFunction('atan')">atan</button>
        <button class="btn btn-sci" onclick="appendFunction('percent')">%</button>
      </div>
      
      <div class="buttons">
        <button class="btn btn-clear" onclick="clearDisplay()">
          <span>C</span>
        </button>
        <button class="btn btn-operator" onclick="appendOperator('/')">
          <span>÷</span>
        </button>
        <button class="btn btn-operator" onclick="appendOperator('*')">
          <span>×</span>
        </button>
        <button class="btn btn-delete" onclick="deleteLast()">
          <span>⌫</span>
        </button>
        
        <button class="btn" onclick="appendNumber('7')">
          <span>7</span>
        </button>
        <button class="btn" onclick="appendNumber('8')">
          <span>8</span>
        </button>
        <button class="btn" onclick="appendNumber('9')">
          <span>9</span>
        </button>
        <button class="btn btn-operator" onclick="appendOperator('-')">
          <span>−</span>
        </button>
        
        <button class="btn" onclick="appendNumber('4')">
          <span>4</span>
        </button>
        <button class="btn" onclick="appendNumber('5')">
          <span>5</span>
        </button>
        <button class="btn" onclick="appendNumber('6')">
          <span>6</span>
        </button>
        <button class="btn btn-operator" onclick="appendOperator('+')">
          <span>+</span>
        </button>
        
        <button class="btn" onclick="appendNumber('1')">
          <span>1</span>
        </button>
        <button class="btn" onclick="appendNumber('2')">
          <span>2</span>
        </button>
        <button class="btn" onclick="appendNumber('3')">
          <span>3</span>
        </button>
        <button class="btn btn-equals" onclick="calculate()" style="grid-row: span 2;">
          <span>=</span>
        </button>
        
        <button class="btn" onclick="appendNumber('0')" style="grid-column: span 2;">
          <span>0</span>
        </button>
        <button class="btn" onclick="appendNumber('.')">
          <span>.</span>
        </button>
      </div>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
