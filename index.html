<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Modern Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator-container">
    <div class="calculator">
      <div class="display-wrapper">
        <div class="display" id="display">0</div>
      </div>
      <div class="buttons">
        <button class="btn btn-clear" onclick="clearDisplay()">
          <span class="btn-icon">C</span>
        </button>
        <button class="btn btn-operator" onclick="appendOperator('/')">
          <span class="btn-icon">÷</span>
        </button>
        <button class="btn btn-operator" onclick="appendOperator('*')">
          <span class="btn-icon">×</span>
        </button>
        <button class="btn btn-delete" onclick="deleteLast()">
          <span class="btn-icon">⌫</span>
        </button>
        
        <button class="btn" onclick="appendNumber('7')">
          <span class="btn-icon">7</span>
        </button>
        <button class="btn" onclick="appendNumber('8')">
          <span class="btn-icon">8</span>
        </button>
        <button class="btn" onclick="appendNumber('9')">
          <span class="btn-icon">9</span>
        </button>
        <button class="btn btn-operator" onclick="appendOperator('-')">
          <span class="btn-icon">−</span>
        </button>
        
        <button class="btn" onclick="appendNumber('4')">
          <span class="btn-icon">4</span>
        </button>
        <button class="btn" onclick="appendNumber('5')">
          <span class="btn-icon">5</span>
        </button>
        <button class="btn" onclick="appendNumber('6')">
          <span class="btn-icon">6</span>
        </button>
        <button class="btn btn-operator" onclick="appendOperator('+')">
          <span class="btn-icon">+</span>
        </button>
        
        <button class="btn" onclick="appendNumber('1')">
          <span class="btn-icon">1</span>
        </button>
        <button class="btn" onclick="appendNumber('2')">
          <span class="btn-icon">2</span>
        </button>
        <button class="btn" onclick="appendNumber('3')">
          <span class="btn-icon">3</span>
        </button>
        <button class="btn btn-equals" onclick="calculate()" style="grid-row: span 2;">
          <span class="btn-icon">=</span>
        </button>
        
        <button class="btn" onclick="appendNumber('0')" style="grid-column: span 2;">
          <span class="btn-icon">0</span>
        </button>
        <button class="btn" onclick="appendNumber('.')">
          <span class="btn-icon">.</span>
        </button>
      </div>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
